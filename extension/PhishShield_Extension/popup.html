<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishShield</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="eyebrow">Security Monitor</p>
      <h1>PhishShield</h1>
      <p class="subtitle">Live phishing risk for your current tab</p>
      <div class="stats-row">
        <div class="stat-pill">
          <span class="stat-label">Total</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="stat-pill safe">
          <span class="stat-label">Safe</span>
          <strong id="safeCount">0</strong>
        </div>
        <div class="stat-pill phishing">
          <span class="stat-label">Phish</span>
          <strong id="phishCount">0</strong>
        </div>
      </div>
    </header>

    <section class="panel status-panel" id="currentStatus">
      <div id="loading" class="loading" style="display:none;">Scanning current page...</div>
      <div id="result"></div>
    </section>

    <section class="panel history-panel">
      <div class="panel-head">
        <h2>Recent Scans</h2>
        <span class="panel-sub">Latest 10 checks</span>
      </div>
      <div id="history" class="history-list"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
